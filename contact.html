<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
    <h1>Contact Me</h1>
</header>

<main class="container">
    <form class="card fade-in">

        <label>Name:</label>
        <input type="text" required>

        <label>Email:</label>
        <input type="email" required>

        <label>Message:</label>
        <textarea required></textarea>

        <button type="submit">Send</button>

    </form>
</main>

</body>
</html>
